# Tool entrypoints are scripts, not production libraries.
# Keep recommended lints; relax only raw-type pedantry used heavily with GraphQL maps.
include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: false

linter:
  rules:
    avoid_print: false
    prefer_const_constructors: false
    public_member_api_docs: false
