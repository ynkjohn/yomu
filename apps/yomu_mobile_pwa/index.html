<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#121418" />
    <title>Yomu</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #121418;
        --surface: #1c1f26;
        --text: #e8eaed;
        --muted: #9aa0a6;
        --accent: #6c9eff;
        --danger: #ff6b6b;
        --ok: #3ddc97;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        padding: max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
      }
      main {
        max-width: 480px;
        margin: 0 auto;
      }
      h1 { font-size: 1.5rem; margin: 0 0 8px; }
      p { color: var(--muted); line-height: 1.45; }
      .card {
        background: var(--surface);
        border: 1px solid #2e3440;
        border-radius: 8px;
        padding: 16px;
        margin-top: 16px;
      }
      .pill {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        margin-right: 8px;
      }
      .ok { color: var(--ok); border: 1px solid color-mix(in srgb, var(--ok) 50%, transparent); background: color-mix(in srgb, var(--ok) 15%, transparent); }
      .bad { color: var(--danger); border: 1px solid color-mix(in srgb, var(--danger) 50%, transparent); background: color-mix(in srgb, var(--danger) 15%, transparent); }
      code { font-size: 0.85rem; word-break: break-all; }
      button {
        margin-top: 12px;
        background: var(--accent);
        color: #0b0d10;
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Yomu (PWA stub)</h1>
      <p>
        Interface mobile provisória. No MVP ela só fala com o <strong>Yomu Core</strong>
        (nunca com o Suwayomi diretamente). Pareamento e leitura entram após o gate de extensões + leitura.
      </p>
      <div class="card">
        <div id="status-pills">
          <span class="pill bad" id="yomu-pill">Yomu: …</span>
          <span class="pill bad" id="suw-pill">Suwayomi: …</span>
        </div>
        <p id="detail" style="margin-top:12px"></p>
        <button type="button" id="reload">Atualizar health</button>
      </div>
    </main>
    <script>
      async function refresh() {
        const yomuPill = document.getElementById('yomu-pill');
        const suwPill = document.getElementById('suw-pill');
        const detail = document.getElementById('detail');
        try {
          const res = await fetch('/health', { cache: 'no-store' });
          const data = await res.json();
          yomuPill.textContent = 'Yomu: ' + (data.yomu || 'ok');
          yomuPill.className = 'pill ok';
          const s = data.suwayomi || {};
          suwPill.textContent = 'Suwayomi: ' + (s.state || 'unknown');
          suwPill.className = 'pill ' + (s.isReady ? 'ok' : 'bad');
          detail.innerHTML =
            '<code>' + JSON.stringify(data, null, 2) + '</code>';
        } catch (e) {
          yomuPill.textContent = 'Yomu: offline';
          yomuPill.className = 'pill bad';
          suwPill.textContent = 'Suwayomi: ?';
          suwPill.className = 'pill bad';
          detail.textContent =
            'Não foi possível alcançar o Yomu Core. Confirme Wi‑Fi, app desktop aberto e firewall.';
        }
      }
      document.getElementById('reload').addEventListener('click', refresh);
      refresh();
      setInterval(refresh, 5000);
    </script>
  </body>
</html>
